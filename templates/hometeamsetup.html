<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Form</title>
   <style>
        /* Basic styling for the layout */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
         }

        header {
            background-color: #333;
            color: #fff;
            text-align: center;
            width: 100%;
            padding: 40px 0;
        }

        form {
            max-width: 600px;
            width: 100%;
            padding: 20px;
            margin: 20px auto;
        }

        #entries {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #entries > div {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            min-width: 80px;
            font-weight: bold;
        }

        input[type="text"] {
            padding: 5px;
            font-size: 14px;
        }

        input[readonly] {
            background-color: #e9ecef;
            cursor: not-allowed;
            width: 60px;
            text-align: center;
        }

        input[name^="name_"] {
            flex: 1;
            min-width: 200px;
        }

        input[type="submit"] {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 16px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        input[type="submit"]:hover {
            background: linear-gradient(135deg, #0e7e6f 0%, #2dd368 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
        }
        </style>
    <script>
        function addEntry() {
            const entriesDiv = document.getElementById('entries');
            const entryIndex = entriesDiv.childElementCount;

            const entryDiv = document.createElement('div');
            entryDiv.innerHTML = `

                <label for="name_${entryIndex}">Player${entryIndex+1}:</label>
                <input type="number" id="hatnum_${entryIndex}" name="hatnum_${entryIndex}">
                <input type="text" id="name_${entryIndex}" name="name_${entryIndex}"><br><br>

            `;
            entriesDiv.appendChild(entryDiv);

            // Update the number of entries
            document.getElementById('num_entries').value = entryIndex + 1;
        }
    </script>
</head>
<body>

  <header>

      <h1>
          <span style="font-size: 120px; color: grey;">&nbsp;&nbsp;&nbsp;Home Team Names&nbsp;&nbsp;&nbsp;&nbsp; </span>
      </h1>
  </header>

    <form action="/savehomeplayers/{{ user_id }}" method="POST">
        <input type="hidden" id="num_entries" name="num_entries" value="{{ data|length }}">
        <div id="entries">
            {% for record in data %}
            <div>
                <label for="name_{{ loop.index0 }}">Player:</label>
                 <input type="text" id="hatnum_{{ loop.index0 }}" name="hatnum_{{ loop.index0 }}" value="{{ record[0] }}" readonly>
                <input type="text" id="name_{{ loop.index0 }}" name="name_{{ loop.index0 }}" value="{{ record[1] }}">
            </div>
            {% endfor %}
        </div>
<!--        <button type="button" onclick="addEntry()">Add Another Entry</button><br><br>-->
        <input type="submit" value="Submit">
    </form>
</body>
</html>
